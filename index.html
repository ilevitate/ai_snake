<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>贪吃蛇游戏</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 游戏主容器 -->
    <div class="game-container">
        <!-- 左侧：标题和计分板 -->
        <div class="game-header">
            <!-- 游戏标题 -->
            <h1>🐍 贪吃蛇</h1>
            
            <!-- 计分板：显示当前得分和最高分 -->
            <div class="score-board">
                <span>得分: <strong id="score">0</strong></span>
                <span>最高分: <strong id="highScore">0</strong></span>
                <button id="muteBtn" class="mute-btn" title="开关音效">🔊</button>
            </div>
        </div>
        
        <!-- 中间：画布 -->
        <div class="canvas-wrapper">
            <!-- 游戏画布：宽800像素，高450像素 -->
            <canvas id="gameCanvas" width="800" height="450"></canvas>
        </div>
        
        <!-- 右侧：控制区域 -->
        <div class="controls">
            <p id="controlText">移动鼠标控制蛇移动方向，空格键暂停</p>
            <button id="gameBtn" type="button">开始游戏</button>
        </div>
        
        <!-- 游戏结束界面（初始隐藏） -->
        <div id="gameOver" class="game-over hidden">
            <h2>游戏结束!</h2>
            <p>最终得分: <span id="finalScore">0</span></p>
            <button id="restartBtn" type="button">重新开始</button>
        </div>
    </div>

    <!-- 引入游戏脚本 -->
    <script src="js/snake.js"></script>
    <script src="js/food.js"></script>
    <script src="js/effects.js"></script>
    <script src="js/offscreenRenderer.js"></script>
    <script src="js/webglParticles.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
